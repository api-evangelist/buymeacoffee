description: >-
  FinOps view of Buy Me a Coffee spend. Buy Me a Coffee is unusual for a
  FinOps profile in that the platform is a revenue channel for creators rather
  than a cost center - but it does levy fees. There is no monthly subscription
  fee; instead the platform retains a flat 5% of each transaction (tips,
  memberships, and shop / Extras sales), and third-party payment processing
  (Stripe) is charged separately at roughly 2.9% + 0.30 USD per transaction
  plus a small payout-processing fee. The developer API is free to use. For a
  team consuming the API, the direct API cost is effectively zero; the
  meaningful "spend" is the platform + processing fees deducted from creator
  earnings.
notes: >-
  Exact Stripe processing rates vary by country and can change. Treat the 5%
  platform fee and no-monthly-fee as the anchor terms and verify processing
  rates during reconciliation.
