meters:
- name: platform_fee
  description: Flat 5% platform fee retained by Buy Me a Coffee on each transaction.
  unit: percent
  aggregation: sum
  dimensions:
  - account
  - transaction_type
- name: payment_processing_fee
  description: Third-party Stripe processing fee (~2.9% + $0.30) per successful transaction.
  unit: transaction
  aggregation: sum
  dimensions:
  - account
  - country
- name: payout_fee
  description: Stripe payout-processing fee applied when transferring balance to the creator.
  unit: payout
  aggregation: sum
  dimensions:
  - account
- name: api_usage
  description: Developer API calls; free of charge (no metered cost).
  unit: requests
  aggregation: sum
  dimensions:
  - token
principles:
- name: Visibility
  description: Track the 5% platform fee and Stripe processing separately from gross transaction volume; the API returns amounts and currency per supporter, member, and Extras purchase for reconciliation.
- name: Allocation
  description: Attribute earnings and fees by transaction type (tips vs memberships vs Extras) and by country using the fields returned from the API.
- name: Optimization
  description: There is no monthly fee to optimize away; focus on the mix of transaction types and on payout timing/threshold to minimize per-payout processing overhead.
- name: Accountability
  description: Export supporter/member/Extras data via the API to reconcile net payouts against gross transactions and the deducted platform + processing fees.
